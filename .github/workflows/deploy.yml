name: Mirror to GitLab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USER: ${{ vars.GITLAB_USER }}
          GITLAB_HOST: ${{ vars.GITLAB_HOST }}
          GITLAB_REPO: ${{ vars.GITLAB_REPO }}
        run: |
          git remote add gitlab "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}/${GITLAB_REPO}.git"
          git push gitlab main --force
